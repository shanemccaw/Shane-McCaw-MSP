openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: leads
    description: Lead management operations
  - name: services
    description: Public service catalog operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      operationId: authRefresh
      tags: [auth]
      summary: Refresh access token using httpOnly cookie
      responses:
        "200":
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: authLogout
      tags: [auth]
      summary: Log out and clear refresh token cookie
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/asset-library/categories:
    get:
      operationId: listAssetLibraryCategories
      tags: [asset-library]
      summary: List asset library categories
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AssetLibraryCategory"
    post:
      operationId: createAssetLibraryCategory
      tags: [asset-library]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetLibraryCategoryInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetLibraryCategory"

  /admin/asset-library/categories/{id}:
    put:
      operationId: updateAssetLibraryCategory
      tags: [asset-library]
      summary: Rename a category (propagates to all assets)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssetLibraryCategoryInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetLibraryCategory"
    delete:
      operationId: deleteAssetLibraryCategory
      tags: [asset-library]
      summary: Delete a category (only if no assets use it)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/asset-library/instruction-sets:
    get:
      operationId: listInstructionSets
      tags: [asset-library]
      summary: List instruction sets
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of instruction sets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InstructionSet"
    post:
      operationId: createInstructionSet
      tags: [asset-library]
      summary: Create instruction set
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstructionSetInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstructionSet"

  /admin/asset-library/instruction-sets/{id}:
    get:
      operationId: getInstructionSet
      tags: [asset-library]
      summary: Get instruction set by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Instruction set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstructionSet"
    put:
      operationId: updateInstructionSet
      tags: [asset-library]
      summary: Update instruction set
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InstructionSetInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstructionSet"
    delete:
      operationId: deleteInstructionSet
      tags: [asset-library]
      summary: Delete instruction set
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/asset-library/checklists:
    get:
      operationId: listChecklists
      tags: [asset-library]
      summary: List checklists
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of checklists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Checklist"
    post:
      operationId: createChecklist
      tags: [asset-library]
      summary: Create checklist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChecklistInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Checklist"

  /admin/asset-library/checklists/{id}:
    get:
      operationId: getChecklist
      tags: [asset-library]
      summary: Get checklist by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Checklist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Checklist"
    put:
      operationId: updateChecklist
      tags: [asset-library]
      summary: Update checklist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChecklistInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Checklist"
    delete:
      operationId: deleteChecklist
      tags: [asset-library]
      summary: Delete checklist
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/asset-library/artifact-sets:
    get:
      operationId: listArtifactSets
      tags: [asset-library]
      summary: List artifact sets
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of artifact sets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ArtifactSet"
    post:
      operationId: createArtifactSet
      tags: [asset-library]
      summary: Create artifact set
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArtifactSetInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactSet"

  /admin/asset-library/artifact-sets/{id}:
    get:
      operationId: getArtifactSet
      tags: [asset-library]
      summary: Get artifact set by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Artifact set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactSet"
    put:
      operationId: updateArtifactSet
      tags: [asset-library]
      summary: Update artifact set
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArtifactSetInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactSet"
    delete:
      operationId: deleteArtifactSet
      tags: [asset-library]
      summary: Delete artifact set
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/asset-library/deliverable-sets:
    get:
      operationId: listDeliverableSets
      tags: [asset-library]
      summary: List deliverable sets
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of deliverable sets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeliverableSet"
    post:
      operationId: createDeliverableSet
      tags: [asset-library]
      summary: Create deliverable set
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliverableSetInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliverableSet"

  /admin/asset-library/deliverable-sets/{id}:
    get:
      operationId: getDeliverableSet
      tags: [asset-library]
      summary: Get deliverable set by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deliverable set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliverableSet"
    put:
      operationId: updateDeliverableSet
      tags: [asset-library]
      summary: Update deliverable set
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliverableSetInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliverableSet"
    delete:
      operationId: deleteDeliverableSet
      tags: [asset-library]
      summary: Delete deliverable set
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /services:
    get:
      operationId: listPublicServices
      tags: [services]
      summary: List public service offerings
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [micro_offer, retainer, service_area]
      responses:
        "200":
          description: List of public services
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PublicService"

  /leads:
    post:
      operationId: createLead
      tags: [leads]
      summary: Submit a lead (public)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadInput"
      responses:
        "201":
          description: Lead created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      operationId: listLeads
      tags: [leads]
      summary: List leads (admin only)
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: source
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated lead list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadList"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads/stats:
    get:
      operationId: getLeadStats
      tags: [leads]
      summary: Get lead statistics (admin only)
      responses:
        "200":
          description: Lead stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadStats"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /leads/{id}:
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update lead status (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LeadUpdate"
      responses:
        "200":
          description: Lead updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lead"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Lead not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/emails:
    get:
      operationId: listAdminEmails
      tags: [admin]
      summary: List ingested emails (admin only)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: userId
          in: query
          schema:
            type: integer
        - name: linked
          in: query
          schema:
            type: boolean
        - name: unlinked
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Paginated email list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestedEmailList"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/emails/{id}:
    patch:
      operationId: assignAdminEmail
      tags: [admin]
      summary: Manually assign an email to a client (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignEmailInput"
      responses:
        "200":
          description: Email updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestedEmail"
        "404":
          description: Email not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/emails/{id}/rematch:
    post:
      operationId: rematchAdminEmail
      tags: [admin]
      summary: Re-run domain matching for a single email (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email re-matched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestedEmail"
        "404":
          description: Email not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/email-domain-rules:
    get:
      operationId: listEmailDomainRules
      tags: [admin]
      summary: List domain→client mapping rules (admin only)
      responses:
        "200":
          description: List of domain rules
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailDomainRuleRow"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createEmailDomainRule
      tags: [admin]
      summary: Create a domain→client mapping rule (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDomainRuleInput"
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailDomainRule"
        "409":
          description: Domain rule already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/email-domain-rules/{id}:
    delete:
      operationId: deleteEmailDomainRule
      tags: [admin]
      summary: Delete a domain→client mapping rule (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rule deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Rule not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/clients/{id}/m365-profile:
    get:
      operationId: getClientM365Profile
      tags: [admin]
      summary: Get M365 environment profile for a client (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: M365 profile data (profile is null if not yet saved)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientM365ProfileResponse"
        "400":
          description: Invalid client ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: putClientM365Profile
      tags: [admin]
      summary: Upsert M365 environment profile for a client (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientM365ProfileInput"
      responses:
        "200":
          description: Profile saved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    ClientM365ProfileResponse:
      type: object
      required: [profile]
      properties:
        profile:
          nullable: true
          type: object
          additionalProperties: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    ClientM365ProfileInput:
      type: object
      required: [profile]
      properties:
        profile:
          type: object
          additionalProperties: true

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    AuthResponse:
      type: object
      required: [accessToken, user]
      properties:
        accessToken:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"

    AuthUser:
      type: object
      required: [id, email, role]
      properties:
        id:
          type: integer
        email:
          type: string
        role:
          type: string

    SuccessResponse:
      type: object
      required: [success]
      properties:
        success:
          type: boolean

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    LeadInput:
      type: object
      required: [name, email, source]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
          format: email
        company:
          type: ["string", "null"]
        companySize:
          type: ["string", "null"]
        serviceArea:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        source:
          type: string
          enum: [contact_form, lead_magnet]
        howFound:
          type: ["string", "null"]

    PublicService:
      type: object
      required: [id, name, slug, billingType, isPublic, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        serviceType:
          type: ["string", "null"]
          enum: [micro_offer, retainer, service_area, null]
        tagline:
          type: ["string", "null"]
        targetAudience:
          type: ["string", "null"]
        price:
          type: ["string", "null"]
        basePrice:
          type: ["string", "null"]
        maxPrice:
          type: ["string", "null"]
        durationDays:
          type: ["integer", "null"]
        turnaround:
          type: ["string", "null"]
        billingType:
          type: string
          enum: [one_time, recurring_monthly]
        isPublic:
          type: boolean
        badge:
          type: ["string", "null"]
        highlighted:
          type: boolean
        hoursPerMonth:
          type: ["string", "null"]
        iconName:
          type: ["string", "null"]
        sortOrder:
          type: ["integer", "null"]
        stripeProductId:
          type: ["string", "null"]
        stripePriceId:
          type: ["string", "null"]
        deliverables:
          type: ["array", "null"]
          items:
            type: string
        inclusions:
          type: ["array", "null"]
          items:
            type: string
        features:
          type: ["array", "null"]
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Lead:
      type: object
      required: [id, name, email, source, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        company:
          type: ["string", "null"]
        companySize:
          type: ["string", "null"]
        serviceArea:
          type: ["string", "null"]
        message:
          type: ["string", "null"]
        source:
          type: string
        status:
          type: string
        howFound:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    LeadUpdate:
      type: object
      properties:
        status:
          type: string
          enum: [new, contacted, qualified, converted, archived]
        message:
          type: ["string", "null"]
        company:
          type: ["string", "null"]

    LeadList:
      type: object
      required: [leads, total, page, limit]
      properties:
        leads:
          type: array
          items:
