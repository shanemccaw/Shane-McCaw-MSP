kind = "web"
previewPath = "/"
title = "Shane McCaw Consulting"
version = "1.0.0"
id = "artifacts/shane-mccaw-consulting"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20446

[services.development]
run = "pnpm --filter @workspace/shane-mccaw-consulting run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/shane-mccaw-consulting", "run", "build" ]
publicDir = "artifacts/shane-mccaw-consulting/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20446"
BASE_PATH = "/"
